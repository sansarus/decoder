name: Build
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          sudo apt-get update
          sudo apt-get install openjdk-17-jdk
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          echo ${{secrets.KEY}} | base64 -d > key.jks
          ./gradlew bundleRelease
          mv app/build/outputs/bundle/release/app-release.aab Decoder.aab
          ./gradlew assembleRelease
          mv app/build/outputs/apk/release/app-release.apk Decoder.apk

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: |
            Decoder.aab
            Decoder.apk
